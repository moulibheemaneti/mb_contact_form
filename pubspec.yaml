name: mb_contact_form
description: A plug-and-play Flutter contact form widget with name, email, and message fields, built-in validation, and native mail app integration.
version: 1.1.2

repository: https://github.com/moulibheemaneti/mb_contact_form
homepage: https://github.com/moulibheemaneti/mb_contact_form
issue_tracker: https://github.com/moulibheemaneti/mb_contact_form/issues

topics:
  - contact-form
  - flutter
  - form
  - email
  - ui

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  mb_button: ^3.0.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
