name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out each section below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably reproduce the issue.
      placeholder: |
        1. Add `MbContactForm` to a widget tree with the following config …
        2. Tap the submit button
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error output / stack trace if available.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Widget usage
      description: Paste the relevant widget code (redact anything sensitive).
      render: dart

  - type: input
    id: mb_contact_form_version
    attributes:
      label: mb_contact_form version
      placeholder: "1.0.2"
    validations:
      required: true

  - type: input
    id: flutter_version
    attributes:
      label: Flutter / Dart SDK version
      description: Output of `flutter --version`.
      placeholder: "Flutter 3.x.x • Dart 3.x.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11…"
    validations:
      required: true
